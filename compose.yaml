name: relaypay

services:
  postgres:
    image: postgres:17.6-bookworm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_only
      POSTGRES_DB: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:8.2.0-bookworm
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: ["uvicorn", "apps.api.asgi:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      RELAYPAY_DATABASE_URL: postgresql+psycopg://relaypay_app:relaypay_app_dev@postgres:5432/relaypay
      PROVIDER_DATABASE_URL: postgresql+psycopg://provider_app:provider_app_dev@postgres:5432/provider
      RECEIVER_DATABASE_URL: postgresql+psycopg://receiver_app:receiver_app_dev@postgres:5432/relaypay
      PROVIDER_BASE_URL: http://provider:8001
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      provider:
        condition: service_started
    security_opt:
      - no-new-privileges:true

  provider:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: ["uvicorn", "apps.provider.asgi:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file: .env
    environment:
      RELAYPAY_DATABASE_URL: postgresql+psycopg://relaypay_app:relaypay_app_dev@postgres:5432/relaypay
      PROVIDER_DATABASE_URL: postgresql+psycopg://provider_app:provider_app_dev@postgres:5432/provider
      RECEIVER_DATABASE_URL: postgresql+psycopg://receiver_app:receiver_app_dev@postgres:5432/relaypay
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    command:
      ["celery", "-A", "apps.worker.celery_app:app", "worker", "--beat", "--loglevel=INFO"]
    env_file: .env
    environment:
      RELAYPAY_DATABASE_URL: postgresql+psycopg://relaypay_app:relaypay_app_dev@postgres:5432/relaypay
      PROVIDER_DATABASE_URL: postgresql+psycopg://provider_app:provider_app_dev@postgres:5432/provider
      RECEIVER_DATABASE_URL: postgresql+psycopg://receiver_app:receiver_app_dev@postgres:5432/relaypay
      PROVIDER_BASE_URL: http://provider:8001
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      provider:
        condition: service_started
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
